[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    blynkkk/Blynk @ ^1.3.2
    bblanchon/ArduinoJson @ ^7.0.4
    https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6
